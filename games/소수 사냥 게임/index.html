<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>소수 사냥 게임 🔍</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
        }

        #number {
            font-size: 80px;
            margin: 20px;
        }

        button {
            font-size: 14px;
            padding: 6px 10px;
            margin: 4px;
        }

        #timer {
            font-size: 40px;
            color: red;
        }

        #score {
            font-size: 30px;
            margin-top: 10px;
        }

        #result {
            font-size: 20px;
            margin-top: 10px;
        }

        table {
            margin: 20px auto;
            border-collapse: collapse;
            width: 80%;
        }

        th, td {
            border: 1px solid black;
            padding: 8px;
        }
    </style>
</head>

<body>

<h1>🔍 소수 사냥 게임</h1>

<div>
    난이도:
    <select id="level">
        <option value="50">쉬움 (1~50)</option>
        <option value="100" selected>보통 (1~100)</option>
        <option value="200">어려움 (1~200)</option>
    </select>

    시간:
    <select id="time">
        <option value="60">1분</option>
        <option value="120" selected>2분</option>
        <option value="180">3분</option>
    </select>

    <button onclick="startGame()">시작</button>
    <button onclick="pauseGame()">일시정지</button>
    <button onclick="stopGame()">그만두기</button>
</div>

<div id="timer">00:00</div>
<div id="countdown"></div>

<div id="number">-</div>

<button onclick="answer(true)">소수</button>
<button onclick="answer(false)">합성수</button>

<div id="result"></div>
<div id="score">점수: 0</div>

<h2>📋 기록</h2>
<table>
    <thead>
        <tr>
            <th>난이도</th>
            <th>시간</th>
            <th>점수</th>
        </tr>
    </thead>
    <tbody id="log"></tbody>
</table>

<script>

// ================= 상태 =================
let current = 0;
let score = 0;
let timeLeft = 0;
let timerInterval;
let running = false;
let maxNumber = 100;
let allowRecord = true;

// ================= 소수 판별 =================
function isPrime(n) {
    if (n < 2) return false;
    for (let i = 2; i <= Math.sqrt(n); i++) {
        if (n % i === 0) return false;
    }
    return true;
}

// ================= 효과음 =================
function playClickSound() {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.type = "square";
    osc.frequency.value = 900;

    gain.gain.value = 0.1;

    osc.start();

    setTimeout(() => {
        osc.stop();
    }, 80);
}

// ================= 랜덤 숫자 =================
function getNumber() {
    return Math.floor(Math.random() * maxNumber) + 1;
}

// ================= 다음 문제 =================
function nextNumber() {
    if (!running) return;

    current = getNumber();
    document.getElementById("number").innerText = current;
    document.getElementById("result").innerText = "";
}

// ================= 답 처리 =================
function answer(user) {
    if (!running) return;

    playClickSound();

    let real = isPrime(current);

    if (user === real) {
        score += 1;
        document.getElementById("result").innerText = "✅ 정답!";
    } else {
        score -= 2;
        document.getElementById("result").innerText = "❌ 틀림 (-2)";
    }

    document.getElementById("score").innerText = "점수: " + score;

    // 🔒 0.5초 버튼 잠금
    const btns = document.querySelectorAll("button");
    btns.forEach(b => b.disabled = true);

    setTimeout(() => {
        btns.forEach(b => b.disabled = false);
        nextNumber();
    }, 500);
}

// ================= 시작 =================
function startGame() {
    score = 0;
    allowRecord = true;

    document.getElementById("score").innerText = "점수: 0";

    maxNumber = parseInt(document.getElementById("level").value);
    timeLeft = parseInt(document.getElementById("time").value);

    startCountdown(3);
}

// ================= 3초 카운트다운 =================
function startCountdown(n) {
    let count = n;
    document.getElementById("countdown").innerText = count;

    let cd = setInterval(() => {
        count--;

        if (count > 0) {
            document.getElementById("countdown").innerText = count;
        } else {
            clearInterval(cd);
            document.getElementById("countdown").innerText = "";

            running = true;
            nextNumber();
            startTimer();
        }
    }, 1000);
}

// ================= 타이머 =================
function startTimer() {
    clearInterval(timerInterval);

    timerInterval = setInterval(() => {
        if (!running) return;

        timeLeft--;

        let m = Math.floor(timeLeft / 60);
        let s = timeLeft % 60;

        document.getElementById("timer").innerText =
            String(m).padStart(2,'0') + ":" + String(s).padStart(2,'0');

        if (timeLeft <= 0) {
            stopGame(true);
        }
    }, 1000);
}

// ================= 일시정지 =================
function pauseGame() {
    running = !running;
}

// ================= 종료 =================
function stopGame(auto=false) {
    if (!running && !auto) return;

    running = false;
    clearInterval(timerInterval);

    document.getElementById("number").innerText = "끝!";

    if (!auto) {
        allowRecord = false;
    }

    saveRecord();
}

// ================= 기록 저장 =================
function saveRecord() {
    if (!allowRecord) return;

    let levelText = document.getElementById("level")
        .selectedOptions[0].text;

    let timeText = document.getElementById("time")
        .selectedOptions[0].text;

    let row = document.createElement("tr");

    row.innerHTML = `
        <td>${levelText}</td>
        <td>${timeText}</td>
        <td>${score}</td>
    `;

    document.getElementById("log").appendChild(row);
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>소인수분해 게임 🧠</title>

<style>
body {
    text-align: center;
    font-family: Arial;
}

#number {
    font-size: 70px;
    margin: 20px;
}

button {
    font-size: 14px;
    padding: 6px 10px;
    margin: 4px;
}

.option {
    display: block;
    width: 60%;
    margin: 5px auto;
    font-size: 18px;
}

#timer {
    font-size: 40px;
    color: red;
}

#score {
    font-size: 30px;
}

table {
    margin: 20px auto;
    border-collapse: collapse;
    width: 80%;
}

td, th {
    border: 1px solid black;
    padding: 8px;
}
</style>

</head>

<body>

<h1>🧠 소인수분해 게임</h1>

<div>
난이도:
<select id="level">
    <option value="30">쉬움 (1~30)</option>
    <option value="60" selected>보통 (1~60)</option>
    <option value="120">어려움 (1~120)</option>
</select>

시간:
<select id="time">
    <option value="60">1분</option>
    <option value="120" selected>2분</option>
    <option value="180">3분</option>
</select>

<button onclick="startGame()">시작</button>
<button onclick="pauseGame()">일시정지</button>
<button onclick="stopGame()">그만두기</button>
</div>

<div id="timer">00:00</div>
<div id="countdown"></div>

<div id="number">-</div>

<div id="options"></div>

<div id="result"></div>
<div id="score">점수: 0</div>

<h2>📋 기록</h2>
<table>
<thead>
<tr>
<th>난이도</th>
<th>시간</th>
<th>점수</th>
</tr>
</thead>
<tbody id="log"></tbody>
</table>

<script>

// ================= 상태 =================
let current = 0;
let score = 0;
let timeLeft = 0;
let timerInterval;
let running = false;
let maxNumber = 60;
let allowRecord = true;

// ================= 소수 판별 =================
function isPrime(n){
    if(n < 2) return false;
    for(let i=2;i<=Math.sqrt(n);i++){
        if(n % i === 0) return false;
    }
    return true;
}

// ================= 소인수분해 =================
function factorize(n){
    let arr = [];
    for(let i=2;i<=n;i++){
        while(n % i === 0){
            arr.push(i);
            n /= i;
        }
    }
    return arr.join(" × ");
}

// ================= 랜덤 =================
function getNumber(){
    return Math.floor(Math.random() * maxNumber) + 10;
}

// ================= 보기 생성 =================
function generateOptions(correct){
    let options = new Set();
    options.add(correct);

    while(options.size < 4){
        let fake = factorize(Math.floor(Math.random() * maxNumber) + 10);
        options.add(fake);
    }

    return Array.from(options).sort(() => Math.random() - 0.5);
}

// ================= 문제 =================
function nextNumber(){
    if(!running) return;

    current = getNumber();

    let correct = factorize(current);
    let options = generateOptions(correct);

    document.getElementById("number").innerText = current;

    let html = "";
    options.forEach(opt=>{
        html += `<button class="option" onclick="answer('${opt.replace(/'/g,"\\'")}')">${opt}</button>`;
    });

    document.getElementById("options").innerHTML = html;
    document.getElementById("result").innerText = "";
}

// ================= 효과음 =================
function sound(){
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.type = "square";
    osc.frequency.value = 800;
    gain.gain.value = 0.1;

    osc.start();
    setTimeout(()=>osc.stop(),80);
}

// ================= 답 =================
function answer(user){
    if(!running) return;

    sound();

    let correct = factorize(current);

    if(user === correct){
        score++;
        document.getElementById("result").innerText = "✅ 정답!";
    } else {
        score -= 1;
        document.getElementById("result").innerText = "❌ 틀림 (-1)";
    }

    document.getElementById("score").innerText = "점수: " + score;

    const btns = document.querySelectorAll("button");
    btns.forEach(b=>b.disabled = true);

    setTimeout(()=>{
        btns.forEach(b=>b.disabled = false);
        nextNumber();
    },500);
}

// ================= 시작 =================
function startGame(){
    score = 0;
    allowRecord = true;

    maxNumber = parseInt(document.getElementById("level").value);
    timeLeft = parseInt(document.getElementById("time").value);

    startCountdown(3);
}

// ================= 카운트다운 =================
function startCountdown(n){
    let c = n;
    document.getElementById("countdown").innerText = c;

    let cd = setInterval(()=>{
        c--;
        if(c>0){
            document.getElementById("countdown").innerText = c;
        } else {
            clearInterval(cd);
            document.getElementById("countdown").innerText = "";
            running = true;
            nextNumber();
            startTimer();
        }
    },1000);
}

// ================= 타이머 =================
function startTimer(){
    clearInterval(timerInterval);

    timerInterval = setInterval(()=>{
        if(!running) return;

        timeLeft--;

        let m = Math.floor(timeLeft/60);
        let s = timeLeft%60;

        document.getElementById("timer").innerText =
            String(m).padStart(2,'0') + ":" + String(s).padStart(2,'0');

        if(timeLeft<=0){
            stopGame(true);
        }
    },1000);
}

// ================= 일시정지 =================
function pauseGame(){
    running = !running;
}

// ================= 종료 =================
function stopGame(auto=false){
    running = false;
    clearInterval(timerInterval);

    if(!auto){
        allowRecord = false;
    }

    saveRecord();
}

// ================= 기록 =================
function saveRecord(){
    if(!allowRecord) return;

    let level = document.getElementById("level").selectedOptions[0].text;
    let time = document.getElementById("time").selectedOptions[0].text;

    let row = document.createElement("tr");
    row.innerHTML = `<td>${level}</td><td>${time}</td><td>${score}</td>`;

    document.getElementById("log").appendChild(row);
}

</script>

</body>
</html>
